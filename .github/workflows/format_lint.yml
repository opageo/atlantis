name: ruff-format-lint

on: #add your hook triggers in the array [push, pull, merge]
  push: # Trigger only on push events
    branches:
      - dev # Trigger only on pushes to the 'main' branch
      - main
  pull_request: # Trigger only on pull request events
    branches:
      - dev
      - main # Trigger only on pull requests targeting the 'main' branch
  workflow_dispatch: # Allow manual triggering of the workflow

jobs:
  format-lint:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6

      - name: Ruff format
        uses: astral-sh/ruff-action@v3
        with:
          args: "format --check --diff"

      - name: Ruff lint
        uses: astral-sh/ruff-action@v3
        with:
          args: "check src --output-format=github"

  check-uv-lock:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.x"
          python-version: "3.11"
      - name: Check uv lock
        run: uv lock --check
