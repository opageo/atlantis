name: E2E Tests

on:
    workflow_dispatch:
    pull_request:
        types: [labeled]
    issue_comment:
        types: [created]

jobs:
    e2e:
        runs-on: ubuntu-latest

        if: |
            github.event_name == 'workflow_dispatch' ||
            (
                github.event_name == 'pull_request' &&
                github.event.action == 'labeled' &&
                github.event.label.name == 'run-e2e'
            ) ||
            (
                github.event_name == 'issue_comment' &&
                github.event.issue.pull_request &&
                contains(github.event.comment.body, '/run-e2e')
            )
                
        steps:
            - uses: actions/checkout@v6

            - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
              with:
                  version: "0.11.x"
                  python-version: "3.11"

            - name: Set up AWS config
              run: |
                  mkdir -p ~/.aws
                  echo "${{ secrets.AWS_CONFIG_FILE }}" > ~/.aws/config
                  echo "${{ secrets.AWS_CREDENTIALS_FILE }}" > ~/.aws/credentials

            - name: Install dependencies
              run: uv sync --all-extras

            - name: Run E2E tests
              env:
                  NO_COLOR: "1"
                  GDAL_HTTP_UNSAFESSL: "YES"
              run: uv run pytest tests/ -m e2e -v --timeout=600
