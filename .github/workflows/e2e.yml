name: E2E Tests

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    types: [labeled]

concurrency:
  group: e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'pull_request' &&
        github.event.action == 'labeled' &&
        github.event.label.name == 'run-e2e'
      )

    runs-on: ubuntu-latest
    container:
      image: ghcr.io/osgeo/gdal:ubuntu-full-3.13.0
      options: --user root

    steps:
      - run: apt-get update && apt-get install -y g++

      - name: Checkout PR code
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Checkout selected ref
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1
        with:
          version: "0.11.x"
          python-version: "3.12"

      - name: Set up AWS config
        run: |
          mkdir -p ~/.aws
          echo "${{ secrets.AWS_CONFIG_FILE }}" > ~/.aws/config
          echo "${{ secrets.AWS_CREDENTIALS_FILE }}" > ~/.aws/credentials

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run E2E tests
        env:
          NO_COLOR: "1"
          GDAL_HTTP_UNSAFESSL: "YES"
          EARTHDATA_TOKEN: ${{ secrets.EARTHDATA_TOKEN }}
        run: uv run pytest tests/ -m e2e -v --timeout=600

      - name: Remove run-e2e label after successful run
        if: github.event_name == 'pull_request' && success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr edit "${{ github.event.pull_request.number }}" --remove-label "run-e2e" || true
