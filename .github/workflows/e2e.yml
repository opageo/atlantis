name: E2E Tests

on:
    workflow_dispatch:
    pull_request:
        types: [labeled]
    issue_comment:
        types: [created]

jobs:
    e2e:
        runs-on: ubuntu-latest

        if: |
            github.event_name == 'workflow_dispatch' ||
            (
              github.event_name == 'pull_request' &&
              github.event.action == 'labeled' &&
              github.event.label.name == 'run-e2e'
            ) ||
            (
              github.event_name == 'issue_comment' &&
              github.event.issue.pull_request &&
              startsWith(github.event.comment.body, '/run-e2e')
            )

        steps:
            - name: Checkout PR code for pull_request event
              if: github.event_name == 'pull_request'
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.pull_request.head.sha }}

            - name: Checkout repository for workflow_dispatch
              if: github.event_name == 'workflow_dispatch'
              uses: actions/checkout@v4

            - name: Checkout PR code for issue_comment event
              if: github.event_name == 'issue_comment'
              uses: actions/checkout@v4
              with:
                  ref: refs/pull/${{ github.event.issue.number }}/head

            - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
              with:
                  version: "0.11.x"
                  python-version: "3.11"

            - name: Set up AWS config
              run: |
                  mkdir -p ~/.aws
                  echo "${{ secrets.AWS_CONFIG_FILE }}" > ~/.aws/config
                  echo "${{ secrets.AWS_CREDENTIALS_FILE }}" > ~/.aws/credentials

            - name: Install dependencies
              run: uv sync --all-extras

            - name: Run E2E tests
              env:
                  NO_COLOR: "1"
                  GDAL_HTTP_UNSAFESSL: "YES"
              run: uv run pytest tests/ -m e2e -v --timeout=600
