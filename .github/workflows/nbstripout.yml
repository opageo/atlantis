name: Check Notebooks Output

on:
  pull_request:
    paths:
      - "**.ipynb"
  push:
    branches:
      - main
    paths:
      - "**.ipynb"
  workflow_dispatch:

jobs:
  check-notebooks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install nbstripout
        run: pip install nbstripout==0.9.1

      - name: Check notebooks are stripped
        run: |
          failed=0
          while IFS= read -r -d '' notebook; do
            echo "Checking $notebook..."
            if ! nbstripout --verify "$notebook"; then
              echo "❌ $notebook has output that should be stripped"
              failed=1
            else
              echo "✅ $notebook is properly stripped"
            fi
          done < <(find . -name "*.ipynb" -type f -print0)
          if [ $failed -eq 1 ]; then
            echo "Some notebooks have output. Run: nbstripout <file>"
            exit 1
          fi
          echo "All notebooks are properly stripped! ✅"
