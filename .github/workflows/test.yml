name: Test

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/osgeo/gdal:ubuntu-full-3.13.0
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: "0.11.x"
          python-version: "3.12"

      - name: Set up AWS config
        run: |
          mkdir -p ~/.aws
          echo "${{ secrets.AWS_CONFIG_FILE }}" > ~/.aws/config
          echo "${{ secrets.AWS_CREDENTIALS_FILE }}" > ~/.aws/credentials

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests with coverage
        env:
          NO_COLOR: "1"
          EARTHDATA_TOKEN: ${{ secrets.EARTHDATA_TOKEN }}
        run: uv run pytest tests/ -m "not e2e" --cov=atlantis --cov-report=json --cov-report=term-missing -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7 # v7
        with:
          files: coverage.json
