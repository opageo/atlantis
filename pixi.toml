# ============================================================================
# Atlantis — pixi.toml
#
# Alternative setup method using pixi (conda-forge based).
# Provides all dependencies including GDAL with HDF4 support out of the box.
#
# Quick start:
#   pixi install          # install default env (geo + dev + GDAL/HDF4)
#   pixi run setup        # bootstrap data assets & credentials
#   pixi run demo         # run Valencia 2024 VIIRS flood example
#
# See docs/pixi-setup.md for the full guide.
# ============================================================================

[workspace]
name = "atlantis"
version = "0.1.1"
description = "ML-ready archive of satellite-derived flood inundation observations (ECMWF Code for Earth 2026)"
authors = ["Stylianos Lagaras", "Ioannis Kalfas"]
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64"]

# ============================================================================
# Default dependencies: runtime + geo extras + GDAL/HDF4 binary stack
# ============================================================================

[dependencies]
python = ">=3.11,<3.15"

# --- Core runtime (mirrors pyproject.toml [project].dependencies) ---
typer = ">=0.26.7"
loguru = ">=0.7.0"
rich = ">=13.0.0"
boto3 = "*"
universal_pathlib = "*"
s3fs = ">=2024.6.0"
python-dotenv = ">=1.0.0"
pydantic = ">=2.0"
pydantic-settings = ">=2.14.2"
geopandas = ">=1.1"
pandas = "<3"
pyarrow = "*"
matplotlib = ">=3.11.0"
ipympl = ">=0.10.0"
plotly = ">=6.7.0"
rasterstats = ">=0.21.0"
odc-stac = ">=0.4"

# --- Geo extras (mirrors pyproject.toml [project.optional-dependencies].geo) ---
xarray = ">=2024.1"
zarr = ">=3.0"
rioxarray = ">=0.15"
pystac = ">=1.9"
pystac-client = ">=0.7"
pyproj = ">=3.6"
shapely = ">=2.0"
rasterio = ">=1.3"
beautifulsoup4 = ">=4.12"
requests = ">=2.34.2"

# --- GDAL + HDF4 binary stack (replaces manual build in docs/gdal-install.md) ---
gdal = "*"
libgdal-hdf4 = "*"
hdf4 = "*"
proj = "*"
geos = "*"

# ============================================================================
# Editable install of the project itself (resolves `atlantis` CLI entry point)
# ============================================================================

[pypi-dependencies]
atlantis = { path = ".", editable = true }

# ----------------------------------------------------------------------------
# GDAL is provided by the conda stack above (gdal/libgdal-hdf4). pyproject.toml
# pins gdal==3.13.0 for pure-uv users, but conda-forge may pin a different
# build per platform (e.g. 3.12.3 on osx-arm64). This override lets pixi's PyPI
# solve accept whatever GDAL conda installs instead of failing on the pin.
# ----------------------------------------------------------------------------
[pypi-options.dependency-overrides]
gdal = ">=3.11"

# ============================================================================
# Feature: dev (development tools)
# ============================================================================

[feature.dev.dependencies]
pytest = ">=9.1.1"
pytest-cov = ">=6.0.0"
pytest-timeout = ">=2.3.0"
pytest-xdist = ">=3.2.0"
pytest-env = "*"
ruff = ">=0.11.0"
pre-commit = ">=4.2.0"
ipython = ">=9.14.1"
ipykernel = ">=7.3.0"
nbstripout = ">=0.9.1"
ripgrep = "*"

[feature.dev.pypi-dependencies]
poethepoet = ">=0.46.0"

# ============================================================================
# Feature: ml (machine learning)
# ============================================================================

[feature.ml.dependencies]
numpy = ">=2.0"
scikit-learn = ">=1.9.0"

[feature.ml.target.linux-64.dependencies]
pytorch-cpu = ">=2.0"

[feature.ml.target.osx-arm64.dependencies]
pytorch = ">=2.0"

# ============================================================================
# Feature: batch (distributed processing)
# ============================================================================

[feature.batch.dependencies]
dask = ">=2024.10"
distributed = "*"
bokeh = ">=3.0"
rio-cogeo = ">=5.0"

# ============================================================================
# Feature: notebooks (Jupyter / ECMWF benchmarking)
# ============================================================================

[feature.notebooks.dependencies]
earthkit-data = "*"
affine = ">=2.4"
cartopy = ">=0.22"

[feature.notebooks.target.linux-64.dependencies]
metview-python = "*"

# ============================================================================
# Environments
# ============================================================================

[environments]
default = { features = ["dev"], solve-group = "default" }
ml = { features = ["dev", "ml"], solve-group = "default" }
notebooks = { features = ["dev", "ml", "notebooks"], solve-group = "default" }
batch = { features = ["dev", "batch"], solve-group = "default" }

# ============================================================================
# Tasks
# ============================================================================

[tasks]
setup = "python scripts/setup.py"
demo = """atlantis --verbose fetch \
  --event Valencia_2024 --source viirs \
  --bbox "-1.5 38.8 0.5 40.0" \
  --start-date 2024-10-29 --end-date 2024-11-04 \
  --strategy all --peak-window-days 2 --max-observations 3 --peak-priority balanced \
  --plot --harmonise --no-keep-processed \
  --output ./data/Valencia_2024"""
demo-modis = """atlantis --verbose fetch \
  --event Valencia_2024 --source modis \
  --bbox "-1.5 38.8 0.5 40.0" \
  --start-date 2024-10-29 --end-date 2024-11-04 \
  --modis-backend laads_hdf4 --modis-composite F2 \
  --strategy all --peak-window-days 2 --max-observations 3 --peak-priority balanced \
  --plot --harmonise --no-keep-processed \
  --output ./data/Valencia_2024"""
demo-gfm = """atlantis --verbose fetch \
  --event Valencia_2024 --source gfm \
  --bbox "-1.5 38.8 0.5 40.0" \
  --start-date 2024-10-29 --end-date 2024-11-04 \
  --strategy all --peak-window-days 2 --max-observations 3 --peak-priority balanced \
  --plot --harmonise --no-keep-processed \
  --output ./data/Valencia_2024"""
demo-raw = """atlantis --verbose fetch \
  --event Valencia_2024 --source viirs \
  --bbox "-1.5 38.8 0.5 40.0" \
  --start-date 2024-10-29 --end-date 2024-11-04 \
  --strategy all --peak-window-days 2 --max-observations 3 --peak-priority balanced \
  --no-classify --plot --harmonise --no-keep-processed \
  --output ./data/Valencia_2024"""
demo-modis-raw = """atlantis --verbose fetch \
  --event Valencia_2024 --source modis \
  --bbox "-1.5 38.8 0.5 40.0" \
  --start-date 2024-10-29 --end-date 2024-11-04 \
  --modis-backend laads_hdf4 --modis-composite F2 \
  --strategy all --peak-window-days 2 --max-observations 3 --peak-priority balanced \
  --no-classify --plot --harmonise --no-keep-processed \
  --output ./data/Valencia_2024"""
demo-gfm-raw = """atlantis --verbose fetch \
  --event Valencia_2024 --source gfm \
  --bbox "-1.5 38.8 0.5 40.0" \
  --start-date 2024-10-29 --end-date 2024-11-04 \
  --strategy all --peak-window-days 2 --max-observations 3 --peak-priority balanced \
  --no-classify --plot --harmonise --no-keep-processed \
  --output ./data/Valencia_2024"""
test = "pytest -n auto tests/"
lint = "ruff check ."
lint-fix = "ruff check . --fix"
format = "ruff format ."
format-fix = "ruff format ."
precommit = "pre-commit run --all-files"
verify-gdal = """python -c "from osgeo import gdal; assert gdal.GetDriverByName('HDF4'), 'HDF4 driver missing'; print('GDAL', gdal.__version__, '— HDF4 driver: OK')" """

