# DISCLAIMER:
# Atlantis does not officially support Conda-only workflows.
# This file is provided as a convenience export/reference from pixi.toml.
# For fully supported setup, use pixi (recommended) or the uv workflow.

name: default
channels:
  - conda-forge
  - nodefaults
dependencies:
  - pytest >=9.1.1
  - pytest-cov >=6.0.0
  - pytest-timeout >=2.3.0
  - pytest-xdist >=3.2.0
  - pytest-env *
  - ruff >=0.11.0
  - pre-commit >=4.2.0
  - ipython >=9.14.1
  - ipykernel >=7.3.0
  - nbstripout >=0.9.1
  - ripgrep *
  - python >=3.11,<3.15
  - typer >=0.26.7
  - loguru >=0.7.0
  - rich >=13.0.0
  - boto3 *
  - universal_pathlib *
  - s3fs >=2024.6.0
  - python-dotenv >=1.0.0
  - pydantic >=2.0
  - pydantic-settings >=2.14.2
  - geopandas >=1.1
  - pandas <3
  - pyarrow *
  - matplotlib >=3.11.0
  - ipympl >=0.10.0
  - plotly >=6.7.0
  - rasterstats >=0.21.0
  - odc-stac >=0.4
  - xarray >=2024.1
  - zarr >=3.0
  - rioxarray >=0.15
  - pystac >=1.9
  - pystac-client >=0.7
  - pyproj >=3.6
  - shapely >=2.0
  - rasterio >=1.3
  - beautifulsoup4 >=4.12
  - requests >=2.34.2
  - gdal *
  - libgdal-hdf4 *
  - hdf4 *
  - proj *
  - geos *
  - pip
  - pip:
      - poethepoet>=0.46.0
